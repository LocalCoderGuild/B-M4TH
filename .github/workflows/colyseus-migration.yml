name: Colyseus Migration Pipeline

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: colyseus-migration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline-engine:
    name: Baseline Engine Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck + full tests
        run: bun run ci

  migration-readiness:
    name: Migration Readiness Gate
    runs-on: ubuntu-latest
    needs: baseline-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Engine regression tests (must stay green during migration)
        run: bun run ci:engine

      - name: Optional Colyseus smoke tests
        shell: bash
        run: |
          if [ -d tests/colyseus ]; then
            echo "Found tests/colyseus, running smoke suite..."
            bun test tests/colyseus
          else
            echo "No tests/colyseus directory yet. Skipping Colyseus smoke tests."
          fi

  build-package:
    name: Package Gate
    runs-on: ubuntu-latest
    needs: migration-readiness
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate lock + scripts
        run: |
          bun run typecheck
          bun run ci:engine
