name: Colyseus Frontend Pipeline

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: colyseus-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-gate:
    name: Server Contract Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Engine + gameplay tests
        run: bun run ci

      - name: Frontend contract tests
        shell: bash
        run: |
          if [ -d apps/web ]; then
            echo "Found apps/web; running frontend contract tests."
            if [ -f apps/web/package.json ]; then
              cd apps/web
              bun install --frozen-lockfile
              bun test --pass-with-no-tests
            fi
          else
            echo "No apps/web frontend yet. Server contract gate passes on engine tests only."
          fi

  room-sync-gate:
    name: Colyseus Room Sync Gate
    runs-on: ubuntu-latest
    needs: contract-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate room and state contracts
        shell: bash
        run: |
          if [ -d src/colyseus ]; then
            echo "Colyseus server code present."
          else
            echo "Colyseus server code not yet added. Add src/colyseus for room/state implementation."
          fi

          if [ -d tests/colyseus ]; then
            bun test tests/colyseus
          fi

  frontend-smoke:
    name: Frontend Smoke Gate
    runs-on: ubuntu-latest
    needs: room-sync-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        shell: bash
        run: |
          if [ -d apps/web ]; then
            cd apps/web
            bun install --frozen-lockfile
          else
            echo "Skipping frontend install; apps/web does not exist yet."
          fi

      - name: Run smoke tests
        shell: bash
        run: |
          if [ -d apps/web ]; then
            cd apps/web
            bun test --pass-with-no-tests
          else
            echo "No frontend app yet."
          fi
