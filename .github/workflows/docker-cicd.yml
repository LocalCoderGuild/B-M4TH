name: Docker Build and Push

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
  workflow_dispatch:

concurrency:
  group: docker-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: cd apps/game && bun install --frozen-lockfile

      - name: Typecheck
        run: cd apps/game && bun run typecheck

      - name: Engine regression tests
        run: cd apps/game && bun run ci:engine

  docker-build-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image owner
        id: image_owner
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (server)
        id: server_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image_owner.outputs.owner_lc }}/b-m4th-server
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/server.Dockerfile
          push: true
          tags: ${{ steps.server_meta.outputs.tags }}
          labels: ${{ steps.server_meta.outputs.labels }}

      - name: Docker metadata (web)
        id: web_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image_owner.outputs.owner_lc }}/b-m4th-web
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/web.Dockerfile
          push: true
          build-args: |
            VITE_SERVER_URL=${{ vars.VITE_SERVER_URL || 'http://localhost:2567' }}
          tags: ${{ steps.web_meta.outputs.tags }}
          labels: ${{ steps.web_meta.outputs.labels }}
