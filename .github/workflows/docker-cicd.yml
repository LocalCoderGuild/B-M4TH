name: Docker Build and Push

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
  workflow_dispatch:

concurrency:
  group: docker-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Engine regression tests
        run: bun run ci:engine

  docker-build-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image refs
        id: image_refs
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "server_image=ghcr.io/${OWNER_LC}/b-m4th-server:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/${OWNER_LC}/b-m4th-web:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/server.Dockerfile
          push: true
          tags: |
            ${{ steps.image_refs.outputs.server_image }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/web.Dockerfile
          push: true
          build-args: |
            VITE_SERVER_URL=${{ vars.VITE_SERVER_URL || 'http://localhost:2567' }}
          tags: |
            ${{ steps.image_refs.outputs.web_image }}
