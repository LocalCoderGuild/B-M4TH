name: Docker CI/CD

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
  workflow_dispatch:

concurrency:
  group: docker-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Engine regression tests
        run: bun run ci:engine

  docker-build-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
      packages: write
    outputs:
      server_image: ${{ steps.image_refs.outputs.server_image }}
      web_image: ${{ steps.image_refs.outputs.web_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image refs
        id: image_refs
        run: |
          echo "server_image=ghcr.io/${{ github.repository_owner }}/b-m4th-server:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/${{ github.repository_owner }}/b-m4th-web:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/server.Dockerfile
          push: true
          tags: |
            ${{ steps.image_refs.outputs.server_image }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/web.Dockerfile
          push: true
          build-args: |
            VITE_SERVER_URL=${{ vars.VITE_SERVER_URL || 'http://localhost:2567' }}
          tags: |
            ${{ steps.image_refs.outputs.web_image }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Evaluate deploy prerequisites
        id: deploy_gate
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -eu
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_SSH_KEY" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Deploy prerequisites detected; deployment steps enabled."
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy secrets are not fully configured. Skipping deploy steps."
          fi

      - name: Ensure remote deploy directory
        if: ${{ steps.deploy_gate.outputs.should_deploy == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -eu
            mkdir -p "${{ vars.DEPLOY_PATH || '/opt/b-m4th' }}"

      - name: Upload production compose file
        if: ${{ steps.deploy_gate.outputs.should_deploy == 'true' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: deploy/docker/docker-compose.prod.yml
          target: ${{ vars.DEPLOY_PATH || '/opt/b-m4th' }}
          strip_components: 2

      - name: Pull and restart containers
        if: ${{ steps.deploy_gate.outputs.should_deploy == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -eu
            DEPLOY_PATH="${{ vars.DEPLOY_PATH || '/opt/b-m4th' }}"
            cd "$DEPLOY_PATH"

            if [ -n "${{ secrets.GHCR_PULL_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_PULL_USER || github.actor }}" --password-stdin
            fi

            cat > .env <<EOF
            SERVER_IMAGE=${{ needs.docker-build-push.outputs.server_image }}
            WEB_IMAGE=${{ needs.docker-build-push.outputs.web_image }}
            PUBLIC_BASE_URL=${{ vars.PUBLIC_BASE_URL }}
            CLIENT_ORIGIN=${{ vars.CLIENT_ORIGIN }}
            WEB_EXPOSE_PORT=${{ vars.WEB_EXPOSE_PORT || '80' }}
            API_EXPOSE_PORT=${{ vars.API_EXPOSE_PORT || '2567' }}
            EOF

            docker compose --env-file .env -f docker-compose.prod.yml pull
            docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans
