services:
  server:
    build:
      context: .
      dockerfile: deploy/docker/server.Dockerfile
    restart: unless-stopped
    environment:
      ENGINE_PORT: "2567"
      API_PORT: "2566"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
    ports:
      - "${ENGINE_EXPOSE_PORT:-2567}:2567"
      - "${API_EXPOSE_PORT:-2566}:2566"

  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    restart: unless-stopped
    environment:
      VITE_ENGINE_URL: ${VITE_ENGINE_URL}
      VITE_API_URL: ${VITE_API_URL}
      VITE_PUBLIC_URL: ${VITE_PUBLIC_URL}
    depends_on:
      - server
    ports:
      - "${WEB_EXPOSE_PORT:-80}:80"
