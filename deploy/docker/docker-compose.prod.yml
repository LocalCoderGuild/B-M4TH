services:
  server:
    image: ${SERVER_IMAGE:?SERVER_IMAGE is required}
    restart: unless-stopped
    environment:
      PORT: "2567"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
    ports:
      - "${API_EXPOSE_PORT:-2567}:2567"

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${WEB_EXPOSE_PORT:-80}:80"
